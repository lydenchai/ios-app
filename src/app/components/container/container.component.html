<ion-app>
    <ion-menu contentId="main-content" side="start">
        <ion-header>
            <ion-toolbar>
                <ion-title>Menu</ion-title>
            </ion-toolbar>
        </ion-header>
        <ion-content class="ion-padding">
            <ion-list>
                <ion-item routerLink="/categories">Categories</ion-item>
                <ion-item routerLink="/profile">Profile</ion-item>
                <ion-item routerLink="/notification">Notifications</ion-item>
            </ion-list>
        </ion-content>
    </ion-menu>
    <div class="ion-page" id="main-content">
        <ion-header>
            <ion-toolbar color="light">
                <ion-buttons slot="start">
                    <ion-menu-button></ion-menu-button>
                </ion-buttons>
                <ion-title>{{ dynamicTitle }}</ion-title>
            </ion-toolbar>
        </ion-header>
        <!-- <ion-content> -->
        <ion-tabs (ionTabsDidChange)="onTabChange($event)">
            <ion-router-outlet></ion-router-outlet>
            <ion-tab-bar slot="bottom">
                <ion-tab-button tab="categories">
                    <ion-icon name="grid"></ion-icon>
                    <ion-label>Categories</ion-label>
                </ion-tab-button>
                <ion-tab-button tab="profile">
                    <ion-icon name="person"></ion-icon>
                    <ion-label>Profile</ion-label>
                </ion-tab-button>
                <ion-tab-button tab="notification">
                    <ion-icon name="notifications"></ion-icon>
                    <ion-label>Notifications</ion-label>
                </ion-tab-button>
            </ion-tab-bar>
        </ion-tabs>
        <!-- </ion-content> -->
    </div>
</ion-app>
