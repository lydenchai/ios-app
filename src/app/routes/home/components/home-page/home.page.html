<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Home</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <!-- Sidebar Menu -->
  <ion-menu contentId="main-content">
    <ion-header>
      <ion-toolbar>
        <ion-title>Menu Content</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content class="ion-padding">This is the menu content.</ion-content>
  </ion-menu>

  <!-- Main Content -->
  <div class="ion-page" id="main-content">
    <ion-header>
      <ion-toolbar>
        <ion-buttons slot="start">
          <ion-menu-button></ion-menu-button>
        </ion-buttons>
        <ion-title>Menu</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content class="ion-padding">
      Tap the button in the toolbar to open the menu.
      <div id="container">
        <ion-button routerLink="/about">Go to About</ion-button>
      </div>
    </ion-content>
  </div>

  <!-- Tabs Section -->
  <ion-tabs>
    <ion-tab-bar slot="bottom">
      <ion-tab-button tab="home">
        <ion-icon name="play-circle"></ion-icon>
        <ion-label>Listen Now</ion-label>
      </ion-tab-button>
      <ion-tab-button tab="radio">
        <ion-icon name="radio"></ion-icon>
        <ion-label>Radio</ion-label>
      </ion-tab-button>
      <ion-tab-button tab="library">
        <ion-icon name="library"></ion-icon>
        <ion-label>Library</ion-label>
      </ion-tab-button>
      <ion-tab-button tab="search">
        <ion-icon name="search"></ion-icon>
        <ion-label>Search</ion-label>
      </ion-tab-button>
    </ion-tab-bar>

    <!-- Home Tab -->
    <ion-tab tab="home">
      <ion-content>
        <div class="example-content">Listen now content</div>
      </ion-content>
    </ion-tab>

    <!-- Radio Tab -->
    <ion-tab tab="radio">
      <ion-content>
        <div class="example-content">Radio content</div>
      </ion-content>
    </ion-tab>

    <!-- Library Tab -->
    <ion-tab tab="library">
      <ion-content>
        <div class="example-content">Library content</div>
      </ion-content>
    </ion-tab>

    <!-- Search Tab -->
    <ion-tab tab="search">
      <ion-content>
        <div class="example-content">Search content</div>
      </ion-content>
    </ion-tab>
  </ion-tabs>
</ion-content>
